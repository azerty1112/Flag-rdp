name: RDP Session with Folder Sync
on:
  workflow_dispatch:
    inputs:
      session_id:
        required: true
      webhook_url:
        required: true
      folder_zip_url:
        required: true
      folder_name:
        required: true
      repeat_request_id:
        required: true
jobs:
  rdp:
    runs-on: windows-latest
    steps:
    - name: Download and extract folder
      run: |
        Invoke-WebRequest -Uri "${{ github.event.inputs.folder_zip_url }}" -OutFile user_folder.zip
        New-Item -ItemType Directory -Force -Path "C:\Users\runneradmin\Desktop\${{ github.event.inputs.folder_name }}"
        Expand-Archive -Path user_folder.zip -DestinationPath "C:\Users\runneradmin\Desktop\${{ github.event.inputs.folder_name }}"
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        $password = "Rdp$($env:GITHUB_RUN_ID)"
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString $password -AsPlainText -Force)
    - name: Setup Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
        .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_TOKEN }}
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389" -NoNewWindow
        Start-Sleep -Seconds 15
    - name: Send Webhook (connection details)
      run: |
        $response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
        $address = $response.tunnels[0].public_url -replace "tcp://", ""
        $password = "Rdp$($env:GITHUB_RUN_ID)"
        $body = @{
            session_id = "${{ github.event.inputs.session_id }}"
            host = $address
            username = "runneradmin"
            password = $password
            status = "ready"
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "${{ github.event.inputs.webhook_url }}" -Method Post -Body $body -ContentType "application/json"
    - name: Keep alive and final sync
      run: |
        Start-Sleep -Seconds 21500
        Compress-Archive -Path "C:\Users\runneradmin\Desktop\${{ github.event.inputs.folder_name }}\*" -DestinationPath "C:\final_updated_folder.zip" -Force
        $uploadUrl = "${{ github.event.inputs.webhook_url }}/upload?secret=${{ secrets.UPLOAD_SECRET }}"
        curl -X POST -F "file=@C:\final_updated_folder.zip" -F "session_id=${{ github.event.inputs.session_id }}" -F "repeat_request_id=${{ github.event.inputs.repeat_request_id }}" "$uploadUrl"